<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnConnect — Schedule a Session</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../public/design/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    .provider-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 8px;
    }
    .submit-btn { cursor: pointer; font-family: inherit; }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }

    .spinner {
      display: none;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn-outline .spinner {
      border-color: rgba(15,59,44,0.3);
      border-top-color: #0f3b2c;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      display: none;
    }
    #status.success {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
      display: block;
    }
    #status.error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      display: block;
    }

@media (max-width: 500px) {
      .provider-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <nav class="container navbar">
      <div class="logo"><i class="fas fa-chalkboard-user"></i> LearnConnect</div>
    </nav>
  </header>

  <main class="form-page">
    <div class="container form-container">

      <h1 style="color:#0f3b2c; margin-bottom:8px;">Schedule a Session</h1>
      <p class="form-subhead">A video room link will be created and emailed to both parties.</p>

      <form id="scheduleForm" novalidate>

        <div class="form-section">
          <h3><i class="fas fa-chalkboard-user"></i> Tutor</h3>
          <div class="form-group">
            <label for="tutorName">Tutor name</label>
            <input id="tutorName" type="text" value="Ms. Campbell" required />
          </div>
          <div class="form-group">
            <label for="tutorEmail">Tutor email</label>
            <input id="tutorEmail" type="email" value="tutor@learnconnect.com" required />
          </div>
        </div>

        <div class="form-section">
          <h3><i class="fas fa-user-graduate"></i> Student</h3>
          <div class="form-group">
            <label for="studentName">Student name</label>
            <input id="studentName" type="text" value="Alex" required />
          </div>
          <div class="form-group">
            <label for="studentEmail">Student email</label>
            <input id="studentEmail" type="email" value="student@email.com" required />
          </div>
        </div>

        <div class="form-section">
          <h3><i class="fas fa-calendar-alt"></i> Session details</h3>

          <div class="form-group">
            <label>Session type</label>
            <div class="days-buttons">
              <span class="day selected" id="typeImmediate">Immediate</span>
              <span class="day" id="typeScheduled">Scheduled</span>
            </div>
            <small style="display:block; margin-top:8px; color:#64748b;">Immediate sessions start right now — no date or time needed.</small>
          </div>

          <div id="dateTimeFields" style="display:none;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
              <div class="form-group">
                <label for="sessionDate">Date</label>
                <input id="sessionDate" type="date" />
              </div>
              <div class="form-group">
                <label for="sessionTime">Time</label>
                <input id="sessionTime" type="time" value="15:00" />
              </div>
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject">
              <option value="">Select a subject…</option>
              <option selected>Math</option>
              <option>Reading &amp; Writing</option>
              <option>Science</option>
              <option>Robotics</option>
              <option>Test Prep</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <h3><i class="fas fa-pen-to-square"></i> Request</h3>
          <div class="form-group">
            <textarea id="request" rows="4" placeholder="Describe what you'd like to cover in this session…"></textarea>
          </div>
        </div>

        <div class="provider-row">
          <button type="submit" class="btn btn-primary btn-block submit-btn"
                  name="provider" value="jitsi" data-label="Start using Jitsi">
            <span class="btn-text">Start using Jitsi</span>
            <span class="spinner"></span>
          </button>
          <button type="submit" class="btn btn-outline btn-block submit-btn"
                  name="provider" value="daily" data-label="Start using Daily">
            <span class="btn-text">Start using Daily</span>
            <span class="spinner"></span>
          </button>
        </div>

      </form>

      <div id="status"></div>


    </div>
  </main>

  <footer><div class="container"><p>&copy; 2026 LearnConnect</p></div></footer>

  <script>
    const EDGE_FN_URL = 'https://voqpgofzhuuzlensefxm.supabase.co/functions/v1/create-meeting';

    // ── MEETING PROVIDER INTERFACE ───────────────────────────────────────────
    // Every provider implements this same shape, so they're interchangeable:
    //   @typedef MeetingProvider { name: string, createMeeting(payload): Promise }
    // Each createMeeting() asks the edge function to build a room with THIS
    // provider; the server holds the secret keys and does the actual work.
    const PROVIDERS = {
      jitsi: { name: 'jitsi', createMeeting: (payload) => requestMeeting('jitsi', payload) },
      daily: { name: 'daily', createMeeting: (payload) => requestMeeting('daily', payload) },
    };

    // Tracks which submit button the user clicked, so setLoading knows which
    // one to show the spinner on.
    let activeBtn = null;

    // Sends the request to the edge function, telling it which provider to use.
    async function requestMeeting(providerName, payload) {
      const res = await fetch(EDGE_FN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...payload, provider: providerName }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      return data;
    }

    // Session type toggle (Immediate / Scheduled)
    let sessionType = 'immediate';
    document.getElementById('sessionDate').valueAsDate = new Date();

    document.getElementById('typeImmediate').addEventListener('click', () => {
      sessionType = 'immediate';
      document.getElementById('typeImmediate').classList.add('selected');
      document.getElementById('typeScheduled').classList.remove('selected');
      document.getElementById('dateTimeFields').style.display = 'none';
    });
    document.getElementById('typeScheduled').addEventListener('click', () => {
      sessionType = 'scheduled';
      document.getElementById('typeScheduled').classList.add('selected');
      document.getElementById('typeImmediate').classList.remove('selected');
      document.getElementById('dateTimeFields').style.display = 'block';
    });

    document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const tutorName    = document.getElementById('tutorName').value.trim();
      const tutorEmail   = document.getElementById('tutorEmail').value.trim();
      const studentName  = document.getElementById('studentName').value.trim();
      const studentEmail = document.getElementById('studentEmail').value.trim();
      const sessionDate  = sessionType === 'scheduled' ? document.getElementById('sessionDate').value : null;
      const sessionTime  = sessionType === 'scheduled' ? document.getElementById('sessionTime').value : null;
      const subject      = document.getElementById('subject').value;
      const request      = document.getElementById('request').value.trim();

      if (!tutorName || !tutorEmail || !studentName || !studentEmail) {
        showStatus('error', 'Please fill in all required fields.');
        return;
      }
      if (sessionType === 'scheduled' && (!sessionDate || !sessionTime)) {
        showStatus('error', 'Please pick a date and time for the scheduled session.');
        return;
      }

      // Resolve the provider from the button that was clicked (e.submitter).
      const providerChoice = e.submitter?.value;
      const provider = PROVIDERS[providerChoice];
      if (!provider) { showStatus('error', `Unknown provider "${providerChoice}".`); return; }

      activeBtn = e.submitter;
      setLoading(true);
      hideStatus();

      const now = new Date();
      const formData = {
        tutorName, tutorEmail, studentName, studentEmail,
        sessionType,
        sessionDate: sessionDate ?? now.toISOString().slice(0, 10),
        sessionTime: sessionTime ?? now.toTimeString().slice(0, 5),
        subject: subject || 'General',
        request
      };

      let confirmation;
      try {
        // The interface call: whichever button the user clicked.
        const data = await provider.createMeeting(formData);
        confirmation = {
          provider:     data.provider,
          meetingUrl:   data.meetingUrl,
          roomName:     data.roomName,
          emailResults: data.emailResults || [],
          ...formData
        };
      } catch (_) {
        // Design fallback: backend unavailable, navigate with placeholder data.
        confirmation = {
          provider:     providerChoice,
          meetingUrl:   `https://meet.learnconnect.com/demo-${Date.now()}`,
          roomName:     'demo-room',
          emailResults: [],
          ...formData
        };
      }

      setLoading(false);
      localStorage.setItem('meetingConfirmation', JSON.stringify(confirmation));
      window.location.href = 'confirmation.html';
    });

    function setLoading(on) {
      document.querySelectorAll('.submit-btn').forEach(btn => btn.disabled = on);
      if (activeBtn) {
        activeBtn.querySelector('.spinner').style.display = on ? 'inline-block' : 'none';
        activeBtn.querySelector('.btn-text').textContent = on ? 'Creating…' : activeBtn.dataset.label;
      }
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.style.display = '';
      el.className = type;
      el.textContent = msg;
    }

    function hideStatus() {
      const el = document.getElementById('status');
      el.className = '';
      el.style.display = 'none';
    }

  </script>

</body>
</html>
