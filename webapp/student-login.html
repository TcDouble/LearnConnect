<!-- student-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnConnect — Student Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav class="container navbar">
            <div class="logo"><i class="fas fa-chalkboard-user"></i> LearnConnect</div>
            <ul class="nav-links">
                <li><a href="homepage.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="pricing.html">Pricing</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-page">
        <div class="container form-container">
            <h1>Student sign in</h1>
            <p class="form-subhead">Enter your email and password to continue.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" required placeholder="you@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign in →</button>
                <p style="margin-top: 20px; text-align: center;">
                    New here? <a href="signup.html">Create an account</a>
                </p>
            </form>
        </div>
    </main>

    <footer><div class="container"><p>&copy; 2026 LearnConnect</p></div></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) { alert('Please enter your email and password'); return; }

            const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (authError) { alert(authError.message); return; }

            const { data: userRow, error: userError } = await supabaseClient
                .from('Users').select('role, firstname, lastname').eq('UID', authData.user.id).single();
            if (userError) { alert(userError.message); return; }

            const fullName = [userRow.firstname, userRow.lastname].filter(Boolean).join(' ');
            if (userRow.role === 'teacher') {
                localStorage.setItem('teacherFullName', fullName);
                localStorage.setItem('teacherEmail', email);
                // No Teachers row yet → go finish profile setup; otherwise the dashboard.
                const { data: tRow } = await supabaseClient.from('Teachers').select('TID').eq('UID', authData.user.id).maybeSingle();
                window.location.href = tRow ? 'Teacher-dashboard.html' : 'Teacher-profile.html';
            } else {
                localStorage.setItem('studentFullName', fullName);
                localStorage.setItem('studentEmail', email);
                const { data: sRow } = await supabaseClient.from('Students').select('SID').eq('UID', authData.user.id).maybeSingle();
                window.location.href = sRow ? 'student-dashboard.html' : 'Profile-setup.html';
            }
        });
    </script>
</body>
</html>
