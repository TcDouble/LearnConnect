<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnConnect — Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <nav class="container navbar">
            <div class="logo"><i class="fas fa-chalkboard-user"></i> LearnConnect</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="pricing.html">Pricing</a></li>
            </ul>
        </nav>
    </header>
    <main class="form-page">
        <div class="container form-container">
            <div class="steps"><div class="step active">Account</div><div class="step">Profile</div></div>
            <h1>Create your account</h1>
            <p class="form-subhead">Sign up first. You'll choose what you want to do — learn, teach, or both — on the next page.</p>
            <form id="signupForm">
                <div class="form-group"><label>Full name <span class="hint">e.g. Jamie Rivera</span></label><input type="text" id="fullName" required></div>
                <div class="form-group"><label>Email address</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Password <span class="hint">At least 8 characters</span></label><input type="password" id="password" required minlength="8"></div>
                <button type="submit" class="btn btn-primary btn-block">Continue to profile setup →</button>
            </form>
        </div>
    </main>
    <footer><div class="container"><p>&copy; 2026 LearnConnect</p></div></footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!fullName || !email || password.length < 8) { alert('Please fill all fields correctly'); return; }

            const { firstname, lastname } = splitFullName(fullName);
            // The handle_new_user() DB trigger creates the public.Users row from this metadata.
            const { data, error } = await supabaseClient.auth.signUp({
                email, password,
                options: {
                    data: { firstname, lastname, role: 'student' },
                    emailRedirectTo: new URL('student-login.html', window.location.href).href
                }
            });
            if (error) { alert(error.message); return; }

            localStorage.setItem('studentFullName', fullName);
            localStorage.setItem('studentEmail', email);

            // If email confirmation is OFF in Supabase, signUp returns a session
            // immediately → skip the confirmation screen and go straight to setup.
            if (data?.session) { window.location.href = 'Profile-setup.html'; return; }

            // Otherwise: confirmation is ON. Show the "check your email" screen.
            document.querySelector('.form-container').innerHTML = `
                <h1>Almost there!</h1>
                <p class="form-subhead">We've sent a confirmation link to <strong>${email}</strong>.
                Confirm your email, then <a href="student-login.html">sign in</a> to finish setting up your profile.</p>`;
        });
    </script>
</body>
</html>
