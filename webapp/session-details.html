<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnConnect — Session Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    .detail-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 18px 22px;
      margin-bottom: 10px;
    }
    .detail-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 3px;
    }
    .detail-value {
      font-size: 1rem;
      font-weight: 600;
      color: #0f3b2c;
    }
    .status-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .status-pill.scheduled  { background: #dcfce7; color: #166534; }
    .status-pill.pending    { background: #fef9c3; color: #854d0e; }
    .status-pill.canceled   { background: #fee2e2; color: #b91c1c; }
    .status-pill.completed  { background: #f1f5f9; color: #334155; }
    .join-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      background: #2b7a4b;
      color: white;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .join-btn:hover { background: #235f3b; }
    .no-link-note {
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .provider-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .provider-btn {
      padding: 13px;
      border-radius: 40px;
      border: none;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
    }
    .provider-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .provider-btn.primary { background: #2b7a4b; color: white; }
    .provider-btn.primary:hover:not(:disabled) { background: #235f3b; }
    .provider-btn.outline { background: white; color: #0f3b2c; border: 1.5px solid #cbd5e1; }
    .provider-btn.outline:hover:not(:disabled) { border-color: #2b7a4b; color: #2b7a4b; }
    .spinner-inline {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    .spinner-inline.dark {
      border-color: rgba(15,59,44,0.25);
      border-top-color: #0f3b2c;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .meeting-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 16px;
      padding: 14px 16px;
      color: #dc2626;
      font-size: 0.88rem;
      margin-top: 8px;
    }
    .cancel-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      font-size: 0.82rem;
      color: #94a3b8;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      width: 100%;
    }
    .cancel-link:hover { color: #64748b; }
  </style>
</head>
<body>

  <header>
    <nav class="container navbar">
      <div class="logo"><i class="fas fa-chalkboard-user"></i> LearnConnect</div>
    </nav>
  </header>

  <main class="form-page">
    <div class="container form-container">

      <a id="backBtn" href="#"
         style="display:inline-flex; align-items:center; gap:6px; font-size:0.85rem; color:#2b7a4b; font-weight:600; text-decoration:none; margin-bottom:20px;">
        <i class="fas fa-arrow-left"></i> Back to dashboard
      </a>

      <h1 style="color:#0f3b2c; margin-bottom:4px;">Session details</h1>
      <p class="form-subhead" style="margin-bottom:24px;">Your confirmed session information.</p>

      <div class="form-section">
        <h3><i class="fas fa-calendar-check"></i> Session</h3>

        <div class="detail-card">
          <div class="detail-label">With</div>
          <div class="detail-value" id="detailWith">—</div>
        </div>

        <div class="detail-card">
          <div class="detail-label">Subject</div>
          <div class="detail-value" id="detailSubject">—</div>
        </div>

        <div class="detail-card">
          <div class="detail-label">Date &amp; time</div>
          <div class="detail-value" id="detailWhen">—</div>
        </div>

        <div class="detail-card" id="detailDurationCard" style="display:none;">
          <div class="detail-label">Duration</div>
          <div class="detail-value" id="detailDuration">—</div>
        </div>

        <div class="detail-card" id="detailNotesCard" style="display:none;">
          <div class="detail-label">Request notes</div>
          <div class="detail-value" id="detailNotes" style="font-weight:400; color:#334155; line-height:1.5;"></div>
        </div>

        <div class="detail-card" id="detailAttachmentCard" style="display:none;">
          <div class="detail-label">Attachment</div>
          <div class="detail-value"><a id="detailAttachmentLink" href="#" target="_blank" style="color:#2b7a4b;text-decoration:none;"><i class="fas fa-paperclip"></i> <span id="detailAttachmentName"></span></a></div>
        </div>

        <div class="detail-card">
          <div class="detail-label">Status</div>
          <div id="detailStatus">—</div>
        </div>
      </div>

      <div class="form-section" id="detailSummarySection" style="display:none; margin-top:8px;">
        <h3><i class="fas fa-clipboard-check"></i> Session summary</h3>

        <div class="detail-card" id="detailRatingsCard" style="display:none;">
          <div class="detail-label">Your rating</div>
          <div class="detail-value" id="detailRatings" style="font-weight:400; line-height:1.7;"></div>
        </div>

        <div class="detail-card" id="detailSessionNotesCard" style="display:none;">
          <div class="detail-label">Notes from the session</div>
          <div class="detail-value" id="detailSessionNotes" style="font-weight:400; color:#334155; line-height:1.5;"></div>
        </div>

        <div class="detail-card" id="detailReviewPromptCard" style="display:none;">
          <div class="detail-label">Your review</div>
          <div class="detail-value" id="detailReviewPrompt" style="font-weight:400;"></div>
        </div>
      </div>

      <div class="form-section" id="meetingRoomSection" style="margin-top:8px;">
        <h3><i class="fas fa-video"></i> Meeting room</h3>
        <div id="meetingLinkArea"></div>
      </div>

    </div>
  </main>

  <footer><div class="container"><p>&copy; 2026 LearnConnect</p></div></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="tz.js"></script>
  <script>
    const EDGE_FN_URL          = 'https://voqpgofzhuuzlensefxm.supabase.co/functions/v1/create-meeting';
    const COMPLETE_SESSION_URL = 'https://voqpgofzhuuzlensefxm.supabase.co/functions/v1/complete-session';

    const raw = localStorage.getItem('sessionDetails');
    if (!raw) { window.location.href = 'student-dashboard.html'; }
    const s = JSON.parse(raw);

    document.getElementById('backBtn').href = s.returnUrl || 'student-dashboard.html';

    document.getElementById('detailWith').textContent    = s.otherName || '—';
    document.getElementById('detailSubject').textContent = s.subject   || '—';

    if (s.sessionDate && s.sessionTime) {
      document.getElementById('detailWhen').textContent = fmtLocalDateTime(s.sessionDate, s.sessionTime);
    } else {
      document.getElementById('detailWhen').innerHTML = '<span style="background:#dcfce7;color:#166534;padding:3px 10px;border-radius:20px;font-size:0.85rem;font-weight:600;">Immediate</span>';
    }

    if (s.duration) {
      const d = s.duration;
      document.getElementById('detailDuration').textContent = d < 60 ? `${d} min` : d === 60 ? '1 hour' : `${d / 60} hours`;
      document.getElementById('detailDurationCard').style.display = 'block';
    }

    if (s.notes) {
      document.getElementById('detailNotes').textContent = s.notes;
      document.getElementById('detailNotesCard').style.display = 'block';
    }

    if (s.attachmentUrl) {
      document.getElementById('detailAttachmentName').textContent = s.attachmentFilename || 'Download file';
      document.getElementById('detailAttachmentCard').style.display = 'block';
      supabaseClient.storage.from('session-attachments').createSignedUrl(s.attachmentUrl, 3600).then(({ data, error }) => {
        if (data?.signedUrl) document.getElementById('detailAttachmentLink').href = data.signedUrl;
        else if (error) document.getElementById('detailAttachmentName').textContent += ' (link unavailable)';
      });
    }

    const statusMap = { scheduled: 'Confirmed', 'waiting for teacher': 'Pending', offer_accepted: 'Awaiting your response', canceled: 'Cancelled', completed: 'Completed' };
    const statusClass = { scheduled: 'scheduled', 'waiting for teacher': 'pending', offer_accepted: 'pending', canceled: 'canceled', completed: 'completed' };
    const statusEl = document.getElementById('detailStatus');
    const st = s.status || 'scheduled';
    statusEl.innerHTML = `<span class="status-pill ${statusClass[st] || 'scheduled'}">${statusMap[st] || st}</span>`;

    // ── Session summary (ratings, notes, review) — completed sessions only ──

    function starsLine(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

    if (st === 'completed') {
      let summaryShown = false;

      const myRating = s.myRole === 'teacher' ? s.teacherRating : s.studentRating;
      if (myRating) {
        document.getElementById('detailRatings').innerHTML = `<span style="color:#f59e0b;">${starsLine(myRating)}</span>`;
        document.getElementById('detailRatingsCard').style.display = 'block';
        summaryShown = true;
      }

      if (s.teacherNotes) {
        document.getElementById('detailSessionNotes').textContent = s.teacherNotes;
        document.getElementById('detailSessionNotesCard').style.display = 'block';
        summaryShown = true;
      }

      const reviewPrompt = document.getElementById('detailReviewPrompt');
      if (s.myReviewSubmitted) {
        reviewPrompt.textContent = "You've already left your review for this session.";
        document.getElementById('detailReviewPromptCard').style.display = 'block';
        summaryShown = true;
      } else if (s.myReviewToken) {
        reviewPrompt.innerHTML = `<a href="post-meeting-review.html?token=${s.myReviewToken}" style="color:#2b7a4b;text-decoration:none;font-weight:600;">Leave your review →</a>`;
        document.getElementById('detailReviewPromptCard').style.display = 'block';
        summaryShown = true;
      }

      if (summaryShown) document.getElementById('detailSummarySection').style.display = 'block';
    }

    // ── Meeting link area ──────────────────────────────────────────────────

    function renderMeetingArea() {
      const area = document.getElementById('meetingLinkArea');
      if (s.status === 'completed') {
        document.getElementById('meetingRoomSection').style.display = 'none';
        return;
      }
      if (s.meetingUrl) {
        const prov = s.meetingProvider
          ? s.meetingProvider.charAt(0).toUpperCase() + s.meetingProvider.slice(1)
          : '';
        area.innerHTML = `
          <a href="${s.meetingUrl}" target="_blank" class="join-btn">
            <i class="fas fa-arrow-up-right-from-square"></i>
            Join${prov ? ' on ' + prov : ' session'}
          </a>
          ${s.isTeacher && s.status === 'scheduled' ? `<button onclick="showProviderPicker()" class="btn btn-outline btn-block"
              style="margin-top:10px;width:100%;cursor:pointer;font-family:inherit;">
            <i class="fas fa-rotate-right"></i> Create new meeting link
          </button>` : ''}
      ${s.isTeacher && s.status === 'scheduled' ? `<button onclick="markComplete()" class="btn btn-outline btn-block"
              style="margin-top:10px;width:100%;cursor:pointer;font-family:inherit;color:#64748b;border-color:#e2e8f0;">
            <i class="fas fa-check-circle"></i> Mark session as complete
          </button>` : ''}
        `;
      } else if (s.isTeacher && s.status === 'scheduled') {
        area.innerHTML = `
          <button onclick="showProviderPicker()" class="btn btn-primary btn-block"
              style="width:100%;cursor:pointer;font-family:inherit;">
            <i class="fas fa-video"></i> Create meeting link
          </button>
        `;
      } else {
        area.innerHTML = `<div class="no-link-note">
          <i class="fas fa-clock" style="margin-right:6px;"></i>
          No meeting link yet — one will be shared before the session starts.
        </div>`;
      }
    }

    function showProviderPicker() {
      const area = document.getElementById('meetingLinkArea');
      area.innerHTML = `
        <p style="font-size:0.88rem;color:#64748b;margin:0 0 10px;">Choose a video platform:</p>
        <div class="provider-grid">
          <button id="btnJitsi" class="provider-btn primary" onclick="createMeeting('jitsi')">
            <i class="fas fa-video"></i> Jitsi
          </button>
          <button id="btnDaily" class="provider-btn outline" onclick="createMeeting('daily')">
            <i class="fas fa-video"></i> Daily
          </button>
        </div>
        <button class="cancel-link" onclick="renderMeetingArea()">Cancel</button>
      `;
    }

    async function createMeeting(providerName) {
      const btnJitsi = document.getElementById('btnJitsi');
      const btnDaily = document.getElementById('btnDaily');
      btnJitsi.disabled = true;
      btnDaily.disabled = true;

      const activeBtn = providerName === 'jitsi' ? btnJitsi : btnDaily;
      const spinnerClass = providerName === 'jitsi' ? '' : 'dark';
      activeBtn.innerHTML = `<span class="spinner-inline ${spinnerClass}"></span> Creating…`;

      let studentEmail = '';
      if (s.session_id) {
        try {
          const { data } = await supabaseClient.rpc('get_student_email_for_session', { p_session_id: s.session_id });
          studentEmail = data || '';
        } catch (_) {}
      }

      const now = new Date();
      const payload = {
        tutorName:    localStorage.getItem('teacherFullName') || '',
        tutorEmail:   localStorage.getItem('teacherEmail')    || '',
        studentName:  s.otherName   || '',
        studentEmail,
        sessionDate:  s.sessionDate || now.toISOString().slice(0, 10),
        sessionTime:  (s.sessionTime || now.toTimeString()).slice(0, 5),
        subject:      s.subject     || 'General',
        provider:     providerName,
      };

      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 20000);
        let res;
        try {
          res = await fetch(EDGE_FN_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });
        } catch (e) {
          throw new Error(e.name === 'AbortError' ? 'Request timed out — please try again.' : 'Network error — check your connection.');
        } finally {
          clearTimeout(timer);
        }

        const result = await res.json();
        if (!res.ok) throw new Error(result.error || 'Something went wrong.');

        // Persist to DB (fire-and-forget)
        if (s.session_id) {
          supabaseClient
            .from('Blocked_Time')
            .update({ meeting_url: result.meetingUrl, meeting_provider: result.provider })
            .eq('SessionID', s.session_id)
            .then(() => {});
        }

        // Update local state and re-render
        s.meetingUrl = result.meetingUrl;
        s.meetingProvider = result.provider;
        renderMeetingArea();

      } catch (err) {
        const area = document.getElementById('meetingLinkArea');
        area.innerHTML = `
          <div class="meeting-error">
            <i class="fas fa-triangle-exclamation"></i> ${err.message || 'Failed to create meeting link.'}
          </div>
          <button onclick="showProviderPicker()" class="btn btn-outline btn-block"
              style="margin-top:10px;width:100%;cursor:pointer;font-family:inherit;">
            Try again
          </button>
        `;
      }
    }

    async function markComplete() {
      const area = document.getElementById('meetingLinkArea');
      if (!confirm('Mark this session as complete? This will notify both you and the student to leave a review.')) return;

      const { data: { session: authSession } } = await supabaseClient.auth.getSession();
      if (!authSession) { alert('Please sign in to continue.'); return; }

      const origHtml = area.innerHTML;
      area.innerHTML = '<p style="color:#64748b;font-size:0.9rem;padding:12px 0;"><i class="fas fa-circle-notch fa-spin"></i> Marking as complete…</p>';

      try {
        const res = await fetch(COMPLETE_SESSION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authSession.access_token}` },
          body: JSON.stringify({ session_id: s.session_id }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Could not complete session.');

        window.location.href = `post-meeting-review.html?token=${data.teacher_review_token}`;
      } catch (err) {
        area.innerHTML = origHtml;
        alert(err.message || 'Failed to mark session as complete.');
      }
    }

    renderMeetingArea();
  </script>

</body>
</html>
